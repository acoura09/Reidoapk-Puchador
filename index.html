<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Checker Ultra Pro - Rei do APK</title>
    <style>
        :root {
            --gold: #f1c40f;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --live: #2ecc71;
            --die: #e74c3c;
            --blue: #3498db;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        /* TELA DE LOGIN / BLOQUEIO */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            text-align: center;
            width: 320px;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.2);
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #000;
            border: 1px solid #444;
            color: var(--gold);
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* CONTEÚDO DO APP */
        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        h2 {
            text-align: center;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 3px solid #444;
        }

        .stat-card.live { border-color: var(--live); }
        .stat-card.dead { border-color: var(--die); }
        .stat-card span { display: block; font-size: 22px; font-weight: bold; }
        .stat-card label { font-size: 11px; color: #aaa; text-transform: uppercase; }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
        }

        .input-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 13px; color: var(--gold); font-weight: bold; }

        textarea {
            height: 120px;
            background: #000;
            color: #00ff41;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
        }

        .file-label {
            margin-top: 8px;
            padding: 8px;
            background: #333;
            color: #fff;
            font-size: 11px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        #progress-fill { width: 0%; height: 100%; background: var(--gold); transition: 0.3s; }

        #log_view {
            height: 200px;
            background: #050505;
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            border: 1px solid #222;
            margin-bottom: 20px;
            font-family: 'Consolas', monospace;
        }

        .music-panel {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px dashed var(--gold);
        }

        .music-controls {
            display: flex;
            gap: 10px;
        }

        .music-input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            padding: 8px;
            color: var(--gold);
            border-radius: 5px;
        }

        #yt-player { display: none; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-row { grid-column: span 2; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-start { background: var(--live); color: #000; }
        .btn-pause { background: var(--die); color: #fff; }
        .btn-copy { background: var(--blue); color: #fff; }
        .btn-download { background: var(--gold); color: #000; }
        .btn-clear { background: #444; color: #fff; }

        button:hover:not(:disabled) { opacity: 0.8; transform: scale(0.98); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .live-text { color: var(--live); }
        .dead-text { color: var(--die); opacity: 0.6; }
        .info-text { color: var(--blue); }

    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-card">
        <h2 style="font-size: 1.1rem; border: none;">👑 ACESSO RESTRITO 👑</h2>
        <p id="login-status" style="font-size: 12px; color: #aaa;">Insira sua credencial premium</p>
        <input type="password" id="passInput" class="login-input" placeholder="DIGITE A SENHA">
        <button class="btn-start" style="width: 100%" onclick="validateAccess()">ENTRAR AGORA</button>
        <div id="time-info" style="margin-top: 15px; font-size: 11px; color: var(--gold);"></div>
    </div>
</div>

<div class="container">
    <h2>👑 REI DO APK - PREMIUM CHECKER 👑</h2>

    <div class="music-panel">
        <label>🎵 PLAYER DE MÚSICA (YOUTUBE BACKGROUND)</label>
        <div class="music-controls">
            <input type="text" id="musicUrl" class="music-input" placeholder="Cole o link do vídeo aqui...">
            <button class="btn-copy" onclick="playMusic()" style="padding: 0 20px;">▶</button>
            <button class="btn-pause" onclick="pauseMusic()" style="padding: 0 20px;">⏸</button>
        </div>
        <div id="yt-player"></div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <span id="count-total">0</span>
            <label>Carregados</label>
        </div>
        <div class="stat-card live">
            <span id="count-live" class="live-text">0</span>
            <label>Lives ✅</label>
        </div>
        <div class="stat-card dead">
            <span id="count-dead" class="dead-text">0</span>
            <label>Deads ❌</label>
        </div>
    </div>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div class="input-grid">
        <div class="input-group">
            <label>LISTA COMBO</label>
            <textarea id="comboList" placeholder="email:senha"></textarea>
            <label class="file-label">📁 Carregar TXT
                <input type="file" hidden accept=".txt" onchange="loadFile(this, 'comboList')">
            </label>
        </div>
        <div class="input-group">
            <label>LISTA COOKIES</label>
            <textarea id="cookieList" placeholder="JSON/Netscape cookies"></textarea>
            <label class="file-label">📁 Carregar TXT
                <input type="file" hidden accept=".txt" onchange="loadFile(this, 'cookieList')">
            </label>
        </div>
    </div>

    <div id="log_view"></div>

    <div class="btn-group">
        <button id="startBtn" class="btn-start full-row" onclick="startMegaCheck()">🚀 Iniciar Varredura</button>
        <button id="pauseBtn" class="btn-pause" onclick="stopCheck()" disabled>⏸ Parar</button>
        <button class="btn-clear" onclick="clearLogs()">🧹 Limpar</button>
        <button class="btn-copy" onclick="copyLives()">📋 Copiar</button>
        <button class="btn-download" onclick="downloadLives()">📥 Baixar .TXT</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // ==========================================================
    // ⚙️ CONFIGURAÇÕES (CORRIGIDAS)
    // ==========================================================
    const CONFIG = {
        senhas: ["0101", "4050", "3030", "0001"], 
        limiteDiario: 30,                              
        horaAbertura: 8,      // 08h
        minAbertura: 0,
        horaFechamento: 00,   // 00:00h
        minFechamento:      // min -> Total :
    };

    let isRunning = false;
    let liveCount = 0;
    let deadCount = 0;
    let livesFound = []; 
    let queue = [];
    let currentIndex = 0;
    let player;

    function checkSystemTime() {
        const agora = new Date();
        const horaAtual = agora.getHours();
        const minAtual = agora.getMinutes();
        
        const info = document.getElementById('time-info');
        info.innerText = `Horário: ${CONFIG.horaAbertura}:00 às ${CONFIG.horaFechamento}:${CONFIG.minFechamento}`;

        // Lógica de verificação precisa
        const inicioEmMinutos = (CONFIG.horaAbertura * 60) + CONFIG.minAbertura;
        const fimEmMinutos = (CONFIG.horaFechamento * 60) + CONFIG.minFechamento;
        const atualEmMinutos = (horaAtual * 60) + minAtual;

        if (atualEmMinutos < inicioEmMinutos || atualEmMinutos >= fimEmMinutos) {
            document.getElementById('login-status').innerText = "🔴 APP FECHADO NO MOMENTO";
            document.getElementById('login-status').style.color = "var(--die)";
            document.getElementById('passInput').disabled = true;
            return false;
        }
        return true;
    }

    function validateAccess() {
        if (!checkSystemTime()) return;

        const input = document.getElementById('passInput').value;
        const status = document.getElementById('login-status');
        const hoje = new Date().toLocaleDateString();

        if (CONFIG.senhas.includes(input)) {
            let key = `uso_${input}_${hoje}`;
            let acessos = parseInt(localStorage.getItem(key) || "0");

            if (acessos < CONFIG.limiteDiario) {
                acessos++;
                localStorage.setItem(key, acessos);
                document.getElementById('lock-screen').style.display = 'none';
                log(`Bem-vindo! Acesso ${acessos}/${CONFIG.limiteDiario} hoje.`, "info-text");
            } else {
                status.innerText = "❌ LIMITE DE 6 ACESSOS ATINGIDO!";
                status.style.color = "var(--die)";
            }
        } else {
            status.innerText = "❌ SENHA INCORRETA!";
            status.style.color = "var(--die)";
        }
    }

    window.onload = checkSystemTime;

    // --- FUNÇÕES DO CHECKER ---
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', { height: '0', width: '0', videoId: '', events: { 'onError': () => {} } });
    }
    function playMusic() {
        const url = document.getElementById('musicUrl').value;
        const id = url.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/user\/\S+|\/ytscreeningroom\?v=))([\w\-]{11})/);
        if (id) { player.loadVideoById(id[1]); player.playVideo(); }
    }
    function pauseMusic() { if (player) player.pauseVideo(); }

    function loadFile(input, targetId) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { document.getElementById(targetId).value = e.target.result; updateTotalCount(); };
        reader.readAsText(file);
    }

    function updateTotalCount() {
        const c = document.getElementById('comboList').value.split('\n').filter(l => l.trim()).length;
        const ck = document.getElementById('cookieList').value.split('\n').filter(l => l.trim()).length;
        document.getElementById('count-total').innerText = c + ck;
    }

    function log(msg, typeClass) {
        const logView = document.getElementById('log_view');
        const div = document.createElement('div');
        div.className = typeClass;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logView.prepend(div);
    }

    async function startMegaCheck() {
        const combos = document.getElementById('comboList').value.split('\n').filter(l => l.trim());
        const cookies = document.getElementById('cookieList').value.split('\n').filter(l => l.trim());
        if (currentIndex === 0) { queue = [...combos.map(v => ({ data: v, type: 'COMBO' })), ...cookies.map(v => ({ data: v, type: 'COOKIE' }))]; }
        if (queue.length === 0) return alert("Sem dados!");
        isRunning = true; toggleButtons(true);
        for (let i = currentIndex; i < queue.length; i++) {
            if (!isRunning) { currentIndex = i; break; }
            await processItem(queue[i]);
            document.getElementById('progress-fill').style.width = ((i + 1) / queue.length * 100) + "%";
        }
        if (currentIndex >= queue.length - 1) { stopCheck(); currentIndex = 0; }
    }

    function processItem(item) {
        return new Promise(resolve => {
            setTimeout(() => {
                const isLive = Math.random() > 0.85; 
                if (isLive) {
                    liveCount++; livesFound.push(item.data);
                    document.getElementById('count-live').innerText = liveCount;
                    log(`LIVE ✅ | ${item.data.substring(0,20)}...`, 'live-text');
                } else {
                    deadCount++; document.getElementById('count-dead').innerText = deadCount;
                    log(`DEAD ❌ | Autenticação Falhou`, 'dead-text');
                }
                resolve();
            }, 500); 
        });
    }

    function stopCheck() { isRunning = false; toggleButtons(false); }
    function toggleButtons(running) { document.getElementById('startBtn').disabled = running; document.getElementById('pauseBtn').disabled = !running; }
    function clearLogs() { if(confirm("Resetar?")) location.reload(); }
    function copyLives() { navigator.clipboard.writeText(livesFound.join('\n')).then(() => alert("Copiado!")); }
    function downloadLives() {
        const blob = new Blob([livesFound.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `lives_rei_${Date.now()}.txt`;
        a.click();
    }
</script>

</body>
</html>
