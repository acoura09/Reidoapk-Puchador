<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REI DO APP - Validador Ultra Multi-Plataforma</title>
    <style>
        /* Fundo Animado */
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #050505;
        }

        .falling-icon {
            position: absolute;
            color: #d4af37;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear infinite;
        }

        /* Estilos Base */
        body { font-family: 'Segoe UI', sans-serif; color: #e0e0e0; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; background: rgba(22, 22, 22, 0.95); padding: 30px; border-radius: 15px; border: 2px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); position: relative; }
        h1 { color: #d4af37; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; text-shadow: 0 0 10px #d4af37; }
        
        .upload-section { border: 2px dashed #444; padding: 40px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; background: rgba(0,0,0,0.5); }
        .upload-section:hover { border-color: #d4af37; background: rgba(20, 20, 20, 0.8); }
        #fileInput { display: none; }
        
        .stats { display: flex; justify-content: space-around; margin: 20px 0; flex-wrap: wrap; gap: 10px; }
        .stat-box { padding: 15px; border-radius: 8px; flex: 1; min-width: 150px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .stat-total { background: #333; color: white; }
        .stat-valid { background: #1b4332; color: #74c69d; border-color: #2ecc71; }
        .stat-invalid { background: #5a181b; color: #ff8787; border-color: #e74c3c; }

        .action-buttons { margin-bottom: 20px; }
        .btn { background: #d4af37; color: black; border: none; padding: 12px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; margin: 5px; text-transform: uppercase; }
        .btn:hover { background: #fff; transform: scale(1.05); box-shadow: 0 0 15px #fff; }

        .results-container { text-align: left; background: #000; border-radius: 8px; height: 450px; overflow-y: auto; padding: 15px; font-family: monospace; border: 1px solid #333; }
        .cookie-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; border-left: 5px solid transparent; margin-bottom: 5px; border-radius: 4px; }
        .cookie-item:hover { background: #1a1a1a; }
        .status-badge { float: right; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        .valid { border-left-color: #2ecc71; background: rgba(46, 204, 113, 0.08); }
        .valid .status-badge { background: #2ecc71; color: #000; }
        .invalid { border-left-color: #e74c3c; opacity: 0.6; }
        .invalid .status-badge { background: #e74c3c; color: #fff; }

        .platform-link { display: inline-block; background: #d4af37; color: #000; padding: 3px 8px; border-radius: 3px; font-size: 11px; text-decoration: none; font-weight: bold; margin-right: 5px; margin-top: 8px; transition: 0.2s; }
        .platform-link:hover { background: #fff; }
        .no-tv { font-size: 10px; color: #888; font-style: italic; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="bg-animation" id="bgAnim"></div>

<div class="container">
    <h1>👑 REI DO APP 👑</h1>
    <p style="color: #888; font-weight: bold;">VARREDOR DE COMBOS MULTI-PLATAFORMA V2.0</p>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p id="uploadText">📁 SOLTE SEUS TXTs OU CLIQUE PARA IMPORTAR</p>
        <input type="file" id="fileInput" multiple accept=".txt">
    </div>

    <div class="stats">
        <div class="stat-box stat-total">CARREGADOS: <span id="countTotal">0</span></div>
        <div class="stat-box stat-valid">VÁLIDOS: <span id="countValid">0</span></div>
        <div class="stat-box stat-invalid">RUINS: <span id="countInvalid">0</span></div>
    </div>

    <div class="action-buttons">
        <button class="btn" onclick="copyValidCookies()">📋 COPIAR TODOS OS VÁLIDOS</button>
    </div>

    <div class="results-container" id="results">
        <p style="color: #666; text-align: center; margin-top: 180px;">Aguardando arquivos para processamento...</p>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const resultsDiv = document.getElementById('results');
    let validList = [];
    let validCount = 0, invalidCount = 0, totalCount = 0;

    // Fundo Animado com Ícones das Plataformas
    const icons = ['Netflix', 'HBO', 'AppleTV', 'Globo', 'Crunchy', 'Canva', '👑', 'Cookie', 'Premium'];
    function createFallingIcon() {
        const icon = document.createElement('div');
        icon.className = 'falling-icon';
        icon.innerText = icons[Math.floor(Math.random() * icons.length)];
        icon.style.left = Math.random() * 100 + "vw";
        icon.style.animationDuration = (Math.random() * 3 + 4) + "s";
        icon.style.fontSize = (Math.random() * 12 + 10) + "px";
        document.getElementById('bgAnim').appendChild(icon);
        setTimeout(() => icon.remove(), 7000);
    }
    setInterval(createFallingIcon, 400);

    fileInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;
        resultsDiv.innerHTML = "";
        validList = [];
        validCount = 0; invalidCount = 0; totalCount = 0;
        
        document.getElementById('uploadText').innerText = "Processando " + files.length + " arquivos...";

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => processContent(ev.target.result, file.name);
            reader.readAsText(file);
        });
    });

    function processContent(content, fileName) {
        totalCount++;
        const lowContent = content.toLowerCase();
        
        // Critério de Validação: Formato Netscape (contém tabs) ou Formato JSON de cookies
        const isNetscape = content.includes('\t') && (content.includes('TRUE') || content.includes('FALSE'));
        const hasKeyValues = content.includes('=') && content.length > 40;
        
        const isValid = isNetscape || hasKeyValues;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'cookie-item';

        if (isValid) {
            validCount++;
            validList.push(content);
            itemDiv.classList.add('valid');
            
            let links = '';
            let tvNote = '';

            // Lógica de Detecção de Plataforma
            if (lowContent.includes("netflix")) {
                links += `<a href="https://www.netflix.com/tv2" target="_blank" class="platform-link">Ativar Netflix</a>`;
            }
            if (lowContent.includes("hbomax") || lowContent.includes("hbo")) {
                links += `<a href="https://auth.hbomax.com/link" target="_blank" class="platform-link">Ativar HBO</a>`;
            }
            if (lowContent.includes("apple")) {
                links += `<a href="https://activate.apple.com/" target="_blank" class="platform-link">Ativar Apple TV</a>`;
            }
            if (lowContent.includes("globo")) {
                links += `<a href="https://ativar.globo.com/" target="_blank" class="platform-link">Ativar Globoplay</a>`;
            }
            if (lowContent.includes("crunchyroll")) {
                links += `<a href="https://www.crunchyroll.com/activate" target="_blank" class="platform-link">Ativar Crunchyroll</a>`;
            }
            if (lowContent.includes("canva")) {
                links += `<span class="platform-link" style="background:#555; color:#fff;">Canva Login</span>`;
                tvNote = `<span class="no-tv">⚠️ Não possui ativação para TV via código.</span>`;
            }

            // Se não identificou marca específica, mas é um cookie válido
            if (links === '') links = `<span class="platform-link">Cookie Desconhecido</span>`;

            itemDiv.innerHTML = `
                <span class="status-badge">VÁLIDO / PRONTO</span>
                <strong>📄 ${fileName}</strong><br>
                ${links}
                ${tvNote}
            `;
            
            // Copiar ao clicar no item
            itemDiv.onclick = () => { 
                navigator.clipboard.writeText(content); 
                alert("Conteúdo de " + fileName + " copiado!"); 
            };
        } else {
            invalidCount++;
            itemDiv.classList.add('invalid');
            itemDiv.innerHTML = `<span class="status-badge">ERRO</span><strong>❌ ${fileName}</strong><br>Formato inválido ou arquivo vazio.`;
        }

        resultsDiv.appendChild(itemDiv);
        updateStats();
    }

    function updateStats() {
        document.getElementById('countTotal').innerText = totalCount;
        document.getElementById('countValid').innerText = validCount;
        document.getElementById('countInvalid').innerText = invalidCount;
    }

    function copyValidCookies() {
        if (validList.length === 0) return alert("Nenhum cookie válido encontrado!");
        const blob = validList.join("\n\n--- PRÓXIMO COMBO ---\n\n");
        navigator.clipboard.writeText(blob);
        alert("Sucesso! " + validCount + " combos copiados para sua área de transferência.");
    }
</script>

</body>
</html>
